<div class="bartender-form-page">
  <div class="page-header">
    <div>
      <h2>{{ isEditMode ? 'Edit Bartender' : 'Create Bartender' }}</h2>
      <p>{{ isEditMode ? 'Update staff information.' : 'Add a new bartender profile to the system.' }}</p>
    </div>
  </div>

  <div class="form-card">
    @if (bartender) {
      <form (ngSubmit)="saveBartender()" #bartenderForm="ngForm">
        <div class="form-grid">

          <div class="field">
            <label>First Name</label>
            <input type="text" [(ngModel)]="bartender.name" name="name" placeholder="Enter first name" required />
          </div>

          <div class="field">
            <label>Last Name</label>
            <input type="text" [(ngModel)]="bartender.lastName" name="lastName" placeholder="Enter last name" required />
          </div>

          <div class="field">
            <label>Phone</label>
            <input #phoneInput type="tel" name="phone" placeholder="Enter phone number" />
          </div>

          <div class="field">
            <label>Email</label>
            <input type="email" [(ngModel)]="bartender.email" name="email" placeholder="Enter email" required />
          </div>

          @if (!isEditMode) {
            <div class="field">
              <label>Password (Min 12 chars)</label>
              <input type="password" [(ngModel)]="bartender.password" name="password" placeholder="Minimum 12 characters" required />
            </div>
          }

          <div class="field">
            <label>Status</label>
            <select [(ngModel)]="bartender.status" name="status">
              <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
            </select>
          </div>

          <div class="field">
            <label>Specialty</label>
            <select [(ngModel)]="bartender.bartenderData!.specialty" name="specialty" required>
              <option value="">Select specialty</option>
              <option *ngFor="let item of specialties" [value]="item">{{ item }}</option>
            </select>
          </div>

          <div class="field">
            <label>Experience Level</label>
            <select [(ngModel)]="bartender.bartenderData!.experienceLevel" name="experienceLevel" required>
              <option value="">Select level</option>
              <option *ngFor="let item of experienceLevels" [value]="item">{{ item }}</option>
            </select>
          </div>

          <div class="field">
            <label>Availability Schedule</label>
            <input type="text" [(ngModel)]="bartender.bartenderData!.availabilitySchedule" name="availabilitySchedule" placeholder="e.g. Weekends" />
          </div>

          <div class="field field-full">
            <label>Notes</label>
            <textarea [(ngModel)]="bartender.bartenderData!.notes" name="notes" rows="3" placeholder="Additional notes..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
          <button type="submit" class="primary-btn" [disabled]="!bartenderForm.valid">
            {{ isEditMode ? 'Update Bartender' : 'Save Bartender' }}
          </button>
        </div>
      </form>
    } @else {
      <div class="loading-state">
        <p>Loading bartender data...</p>
      </div>
    }
  </div>
</div>
