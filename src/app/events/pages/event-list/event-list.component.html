<div class="event-list-page">
  <div class="page-header">
    <div>
      <h2>Events</h2>
      <p>Operational view of approved and scheduled events.</p>
    </div>
  </div>

  <div class="view-switcher-card">
    <div class="view-switcher">
      <button
        [class.active]="currentView === 'list'"
        (click)="setView('list')">
        List View
      </button>

      <button
        [class.active]="currentView === 'calendar'"
        (click)="setView('calendar')">
        Calendar View
      </button>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="event-table-card" *ngIf="currentView === 'list'">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Event</th>
          <th>Client</th>
          <th>Date</th>
          <th>Location</th>
          <th>Bartender</th>
          <th>Bar Type</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let event of events"
          (click)="openEvent(event)"
          class="clickable-row">
          <td>{{ event.id }}</td>
          <td>{{ event.eventName }}</td>
          <td>{{ event.client }}</td>
          <td>{{ event.date }}</td>
          <td>{{ event.location }}</td>
          <td>{{ event.bartender }}</td>
          <td>{{ event.barType }}</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(event.status)">
              {{ event.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- CALENDAR VIEW -->
  <div class="calendar-card" *ngIf="currentView === 'calendar'">
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
