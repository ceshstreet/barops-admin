<div class="drink-theme-list-page">
  <div class="page-header">
    <div>
      <h2>Drink Themes</h2>
      <p>Manage cocktail themes, categories, and event-oriented menu options.</p>
    </div>

    <button class="primary-btn" (click)="createDrinkTheme()">+ New Drink Theme</button>
  </div>

  <div class="drink-theme-table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Theme Name</th>
          <th>Category</th>
          <th>Cocktails Included</th>
          <th>Target Event Type</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let theme of drinkThemes"
          (click)="openDrinkTheme(theme)"
          class="clickable-row">
          <td>{{ theme.id }}</td>
          <td>{{ theme.name }}</td>
          <td>{{ theme.category }}</td>
          <td>{{ theme.cocktailsIncluded }}</td>
          <td>{{ theme.targetEventType }}</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(theme.status)">
              {{ theme.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
