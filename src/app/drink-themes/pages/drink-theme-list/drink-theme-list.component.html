<div class="drink-theme-list-page">
  <div class="page-header">
    <div>
      <h2>Drink Themes</h2>
      <p>Manage drink themes as grouped selections from the drinks catalog.</p>
    </div>

    <button class="primary-btn" (click)="createDrinkTheme()">+ New Drink Theme</button>
  </div>

  <div class="drink-theme-table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Theme Name</th>
          <th>Category</th>
          <th>Drinks Included</th>
          <th>Total Drinks</th>
          <th>Target Event Type</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let theme of drinkThemes"
          (click)="openDrinkTheme(theme)"
          class="clickable-row">
          <td>{{ theme.id }}</td>
          <td>{{ theme.name }}</td>
          <td>{{ theme.category }}</td>
          <td>{{ theme.drinks.join(', ') }}</td>
          <td>{{ getDrinkCount(theme) }}</td>
          <td>{{ theme.targetEventType }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
