<div class="bar-type-form-page">
  <div class="page-header">
    <div>
      <h2>{{ isEditMode ? 'Edit Bar Type' : 'Create Bar Type' }}</h2>
      <p>{{ isEditMode ? 'Update bar configuration.' : 'Add a new portable bar configuration to the system.' }}</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveBarType()" #barTypeForm="ngForm">

      <div class="form-grid">
        <div class="field">
          <label>Bar Name</label>
          <input
            type="text"
            [(ngModel)]="barType.name"
            name="name"
            placeholder="Enter bar name"
            required />
        </div>

        <div class="field">
          <label>Category</label>
          <select [(ngModel)]="barType.category" name="category" required>
            <option value="">Select category</option>
            <option *ngFor="let item of categories" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Lighting</label>
          <select [(ngModel)]="barType.lighting" name="lighting" required>
            <option [ngValue]="true">Yes</option>
            <option [ngValue]="false">No</option>
          </select>
        </div>

        <div class="field">
          <label>Capacity (persons)</label>
          <input
            type="number"
            [(ngModel)]="barType.capacity"
            name="capacity"
            placeholder="Enter capacity"
            min="0"
            required />
        </div>

        <div class="field">
          <label>Setup Type</label>
          <select [(ngModel)]="barType.setupType" name="setupType" required>
            <option value="">Select setup type</option>
            <option *ngFor="let item of setupTypes" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Status</label>
          <select [(ngModel)]="barType.status" name="status">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">
          {{ isEditMode ? 'Update Bar Type' : 'Save Bar Type' }}
        </button>
      </div>

    </form>
  </div>
</div>
