<div class="drink-form-page">
  <div class="page-header">
    <div>
      <h2>Create Drink</h2>
      <p>Add a new drink recipe to the master catalog.</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveDrink()" #drinkForm="ngForm">

      <div class="form-grid">
        <div class="field">
          <label>Drink Name</label>
          <input type="text" [(ngModel)]="drink.name" name="name"
            placeholder="Enter drink name" required />
        </div>

        <div class="field">
          <label>Category</label>
          <select [(ngModel)]="drink.category" name="category">
            <option value="">Select category</option>
            <option *ngFor="let item of categories" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Base Spirit</label>
          <select [(ngModel)]="drink.baseSpirit" name="baseSpirit">
            <option value="">Select base spirit</option>
            <option *ngFor="let item of baseSpirits" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Glassware</label>
          <select [(ngModel)]="drink.glassware" name="glassware">
            <option value="">Select glassware</option>
            <option *ngFor="let item of glasswareOptions" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Garnish</label>
          <input type="text" [(ngModel)]="drink.garnish" name="garnish"
            placeholder="Example: Mint + Lime Wheel" />
        </div>

        <div class="field">
          <label>Serving Size (ml por persona)</label>
          <input type="number" [(ngModel)]="drink.servingSizeMl" name="servingSizeMl"
            placeholder="Ej: 180" min="0" />
        </div>

        <div class="field">
          <label>Status</label>
          <select [(ngModel)]="drink.status" name="status">
            <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
          </select>
        </div>
      </div>

      <!-- INGREDIENTS -->
      <div class="ingredients-section">
        <div class="ingredients-header">
          <h3>Ingredients <span class="hint">(por 1 bebida)</span></h3>
          <button type="button" class="add-btn" (click)="addIngredient()">+ Add</button>
        </div>

        <div class="ingredient-row" *ngFor="let ing of ingredients; let i = index">
          <input type="text" [(ngModel)]="ing.name" [name]="'ingName' + i"
            placeholder="Ingredient name" class="ing-name" />
          <input type="number" [(ngModel)]="ing.amount" [name]="'ingAmount' + i"
            placeholder="Amount" class="ing-amount" min="0" />
          <select [(ngModel)]="ing.unit" [name]="'ingUnit' + i" class="ing-unit">
            <option *ngFor="let u of units" [value]="u">{{ u }}</option>
          </select>
          <button type="button" class="remove-btn" (click)="removeIngredient(i)"
            [disabled]="ingredients.length === 1">✕</button>
        </div>
      </div>

      <div class="form-grid">
        <div class="field field-full">
          <label>Preparation</label>
          <textarea [(ngModel)]="drink.preparation" name="preparation" rows="5"
            placeholder="Describe the recipe step by step"></textarea>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea [(ngModel)]="drink.notes" name="notes" rows="3"
            placeholder="Extra notes for bartender, service, or presentation"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">Save Drink</button>
      </div>

    </form>
  </div>
</div>
