<div class="client-form-page">
  <div class="page-header">
    <div>
      <h2>{{ isEditMode ? 'Edit Client' : 'Create Client' }}</h2>
      <p>{{ isEditMode ? 'Update client information.' : 'Add a new client profile to the system.' }}</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveClient()" #clientForm="ngForm">

      <div class="form-grid">
        <div class="field">
          <label>First Name</label>
          <input
            type="text"
            [(ngModel)]="client.name"
            name="name"
            placeholder="Enter first name"
            required />
        </div>

        <div class="field">
          <label>Last Name</label>
          <input
            type="text"
            [(ngModel)]="client.lastName"
            name="lastName"
            placeholder="Enter last name"
            required />
        </div>

        <div class="field">
          <label>Phone</label>
          <input
            type="text"
            [(ngModel)]="client.phone"
            name="phone"
            placeholder="Enter phone number (9 digits)"
            required />
        </div>

        <div class="field">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="client.email"
            name="email"
            placeholder="Enter email address"
            required />
        </div>

        <div class="field">
          <label>Preferred Contact</label>
          <select [(ngModel)]="client.clientData.preferredContact" name="preferredContact" required>
            <option value="">Select contact method</option>
            <option *ngFor="let method of preferredContacts" [value]="method">{{ method }}</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea
            [(ngModel)]="client.clientData.notes"
            name="notes"
            rows="5"
            placeholder="Add client notes or preferences"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">
          {{ isEditMode ? 'Update Client' : 'Save Client' }}
        </button>
      </div>

    </form>
  </div>
</div>
