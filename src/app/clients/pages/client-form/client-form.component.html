<div class="client-form-page">
  <div class="page-header">
    <div>
      <h2>Create Client</h2>
      <p>Add a new client profile to the system.</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveClient()" #clientForm="ngForm">

      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input
            type="text"
            [(ngModel)]="client.fullName"
            name="fullName"
            placeholder="Enter full name"
            required />
        </div>

        <div class="field">
          <label>Phone</label>
          <input
            type="text"
            [(ngModel)]="client.phone"
            name="phone"
            placeholder="Enter phone number" />
        </div>

        <div class="field">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="client.email"
            name="email"
            placeholder="Enter email address" />
        </div>

        <div class="field">
          <label>Event Type</label>
          <select [(ngModel)]="client.eventType" name="eventType">
            <option value="">Select event type</option>
            <option *ngFor="let type of eventTypes" [value]="type">{{ type }}</option>
          </select>
        </div>

        <div class="field">
          <label>Preferred Contact</label>
          <select [(ngModel)]="client.preferredContact" name="preferredContact">
            <option value="">Select contact method</option>
            <option *ngFor="let method of preferredContacts" [value]="method">{{ method }}</option>
          </select>
        </div>

        <div class="field">
          <label>Budget Range</label>
          <select [(ngModel)]="client.budgetRange" name="budgetRange">
            <option value="">Select budget range</option>
            <option *ngFor="let budget of budgetRanges" [value]="budget">{{ budget }}</option>
          </select>
        </div>

        <div class="field">
          <label>Status</label>
          <select [(ngModel)]="client.status" name="status">
            <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea
            [(ngModel)]="client.notes"
            name="notes"
            rows="5"
            placeholder="Add client notes, preferences, or event details"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">Save Client</button>
      </div>

    </form>
  </div>
</div>
