<div class="client-list-page">
  <div class="page-header">
    <div>
      <h2>Clients</h2>
      <p>Manage customers, contacts, and event history.</p>
    </div>

    <button class="primary-btn" (click)="createClient()">+ New Client</button>
  </div>

  <div class="client-table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Client</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Preferred Contact</th>
          <th>Notes</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let client of clients"
          (click)="openClient(client)"
          class="clickable-row">
          <td>{{ client._id }}</td>
          <td>{{ getFullName(client) }}</td>
          <td>{{ client.phone }}</td>
          <td>{{ client.email }}</td>
          <td>{{ client.clientData?.preferredContact }}</td>
          <td>{{ client.clientData?.notes }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
