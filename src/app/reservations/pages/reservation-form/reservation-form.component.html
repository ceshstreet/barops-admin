<div class="reservation-form-page">
  <div class="page-header">
    <div>
      <h2>Create Reservation</h2>
      <p>Capture the initial booking request before moving it into operations.</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveReservation()" #reservationForm="ngForm">

      <div class="stage-banner">
        <strong>Stage:</strong> {{ reservation.stage | titlecase }}
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Client</label>
          <select [(ngModel)]="reservation.client" name="client" required>
            <option value="">Select client</option>
            <option *ngFor="let client of clients" [value]="client">{{ client }}</option>
          </select>
        </div>

        <div class="field">
          <label>Event Name</label>
          <input
            type="text"
            [(ngModel)]="reservation.eventName"
            name="eventName"
            placeholder="Enter event name"
            required />
        </div>

        <div class="field">
          <label>Event Type</label>
          <select [(ngModel)]="reservation.eventType" name="eventType">
            <option value="">Select event type</option>
            <option *ngFor="let type of eventTypes" [value]="type">{{ type }}</option>
          </select>
        </div>

        <div class="field">
          <label>Event Date</label>
          <input type="date" [(ngModel)]="reservation.eventDate" name="eventDate" />
        </div>

        <div class="field">
          <label>Start Time</label>
          <input type="time" [(ngModel)]="reservation.startTime" name="startTime" />
        </div>

        <div class="field">
          <label>End Time</label>
          <input type="time" [(ngModel)]="reservation.endTime" name="endTime" />
        </div>

        <div class="field field-full">
          <label>Location</label>
          <input
            type="text"
            [(ngModel)]="reservation.location"
            name="location"
            placeholder="City, venue, or address" />
        </div>

        <div class="field">
          <label>Guests</label>
          <select [(ngModel)]="reservation.guests" name="guests">
            <option value="">Select guest range</option>
            <option *ngFor="let guest of guestOptions" [value]="guest">{{ guest }}</option>
          </select>
        </div>

        <div class="field">
          <label>Budget Range</label>
          <select [(ngModel)]="reservation.budgetRange" name="budgetRange">
            <option value="">Select budget range</option>
            <option *ngFor="let budget of budgetRanges" [value]="budget">{{ budget }}</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea
            [(ngModel)]="reservation.notes"
            name="notes"
            rows="5"
            placeholder="Additional booking notes, client requests, or initial comments"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">Save Reservation</button>
      </div>

    </form>
  </div>
</div>
