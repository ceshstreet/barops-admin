<div class="reservation-form-page">
  <div class="page-header">
    <div>
      <h2>{{ isEditMode ? 'Edit Reservation' : 'Create Reservation' }}</h2>
      <p>{{ isEditMode ? 'Update the booking details.' : 'Capture the initial booking request before moving it into operations.' }}</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveReservation()" #reservationForm="ngForm">

      <div class="stage-banner">
        <strong>Stage:</strong> Pending
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Client</label>
          <select [(ngModel)]="reservation.clientId" name="clientId" required>
            <option value="">Select client</option>
            <option *ngFor="let client of clients" [value]="client._id">
              {{ getFullName(client) }}
            </option>
          </select>
        </div>

        <div class="field">
          <label>Event Name</label>
          <input
            type="text"
            [(ngModel)]="reservation.title"
            name="title"
            placeholder="Enter event name"
            required />
        </div>

        <div class="field">
          <label>Event Date</label>
          <input
            type="date"
            [(ngModel)]="reservation.eventDate"
            name="eventDate"
            required />
        </div>

        <div class="field">
          <label>Location</label>
          <input
            type="text"
            [(ngModel)]="reservation.location"
            name="location"
            placeholder="City, venue, or address"
            required />
        </div>

        <div class="field">
          <label>Guests</label>
          <select [(ngModel)]="reservation.guests" name="guests">
            <option value="">Select guest range</option>
            <option *ngFor="let guest of guestOptions" [value]="guest">{{ guest }}</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea
            [(ngModel)]="reservation.notes"
            name="notes"
            rows="5"
            placeholder="Additional booking notes, client requests, or initial comments"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="primary-btn">
          {{ isEditMode ? 'Update Reservation' : 'Save Reservation' }}
        </button>
      </div>

    </form>
  </div>
</div>
