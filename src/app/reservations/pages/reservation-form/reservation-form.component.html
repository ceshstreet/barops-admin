<div class="reservation-form-page">
  <div class="page-header">
    <div>
      <h2>Create Reservation</h2>
      <p>Capture reservation details for a new event.</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="saveReservation()" #reservationForm="ngForm">

      <div class="form-grid">
        <div class="field">
          <label>Client</label>
          <select [(ngModel)]="reservation.client" name="client" required>
            <option value="">Select client</option>
            <option *ngFor="let client of clients" [value]="client">{{ client }}</option>
          </select>
        </div>

        <div class="field">
          <label>Event Name</label>
          <input type="text" [(ngModel)]="reservation.eventName" name="eventName" placeholder="Enter event name" required />
        </div>

        <div class="field">
          <label>Event Type</label>
          <select [(ngModel)]="reservation.eventType" name="eventType">
            <option value="">Select event type</option>
            <option *ngFor="let type of eventTypes" [value]="type">{{ type }}</option>
          </select>
        </div>

        <div class="field">
          <label>Event Date</label>
          <input type="date" [(ngModel)]="reservation.eventDate" name="eventDate" />
        </div>

        <div class="field">
          <label>Start Time</label>
          <input type="time" [(ngModel)]="reservation.startTime" name="startTime" />
        </div>

        <div class="field">
          <label>End Time</label>
          <input type="time" [(ngModel)]="reservation.endTime" name="endTime" />
        </div>

        <div class="field field-full">
          <label>Location</label>
          <input type="text" [(ngModel)]="reservation.location" name="location" placeholder="City, venue, or address" />
        </div>

        <div class="field">
          <label>Guests</label>
          <select [(ngModel)]="reservation.guests" name="guests">
            <option value="">Select guest range</option>
            <option *ngFor="let guest of guestOptions" [value]="guest">{{ guest }}</option>
          </select>
        </div>

        <div class="field">
          <label>Package</label>
          <select [(ngModel)]="reservation.package" name="package">
            <option value="">Select package</option>
            <option *ngFor="let item of packages" [value]="item">{{ item }}</option>
          </select>
        </div>

        <div class="field">
          <label>Drink Theme</label>
          <select [(ngModel)]="reservation.drinkTheme" name="drinkTheme">
            <option value="">Select drink theme</option>
            <option *ngFor="let theme of drinkThemes" [value]="theme">{{ theme }}</option>
          </select>
        </div>

        <div class="field">
          <label>Bartender</label>
          <select [(ngModel)]="reservation.bartender" name="bartender">
            <option value="">Select bartender</option>
            <option *ngFor="let bartender of bartenders" [value]="bartender">{{ bartender }}</option>
          </select>
        </div>

        <div class="field">
          <label>Bar Type</label>
          <select [(ngModel)]="reservation.barType" name="barType">
            <option value="">Select bar type</option>
            <option *ngFor="let bar of barTypes" [value]="bar">{{ bar }}</option>
          </select>
        </div>

        <div class="field">
          <label>Budget Range</label>
          <select [(ngModel)]="reservation.budgetRange" name="budgetRange">
            <option value="">Select budget range</option>
            <option *ngFor="let budget of budgetRanges" [value]="budget">{{ budget }}</option>
          </select>
        </div>

        <div class="field">
          <label>Status</label>
          <select [(ngModel)]="reservation.status" name="status">
            <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Notes</label>
          <textarea [(ngModel)]="reservation.notes" name="notes" rows="5" placeholder="Additional details"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="secondary-btn">Cancel</button>
        <button type="submit" class="primary-btn">Save Reservation</button>
      </div>

    </form>
  </div>
</div>
